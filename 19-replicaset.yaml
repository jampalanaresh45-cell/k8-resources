apiVersion: apps/v1 
kind: ReplicaSet
metadata:
  name: nginx
  ########### Replica set labels ###############
spec:
  replicas: 3
  selector:
  ######### These labels are used to select pods ##############
    matchLables:
      purpose: rs-demo
      project: roboshop
### pod definition ########

  template:
    metadata:
      labels:
        purpose: rs-demo
        project: roboshop
    spec:
      containers:
        - name: nginx
          image: nginx
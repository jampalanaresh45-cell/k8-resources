apiVersion: apps/v1 
kind: ReplicaSet
metadata:
  name: nginx
  ########### Replica set labels ###############
  labels: 
    purpose: rs-demo
    project: roboshop
  
spec:
  replicas: 3
  selector:
  ######### These are used to select pods ##############
    matchLabels:
      purpose: rs-demo
      project: roboshop
### pod definition ########

  template:
    metadata:
      labels:
        purpose: rs-demo
        project: roboshop
    spec:
      containers:
        - name: nginx
          image: nginx